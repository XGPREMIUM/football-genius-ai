app:
  - name: football-genius-api
    routes:
      - path: /
        port: 8000
    env:
      - AI_PROVIDER=openrouter
      - OPENROUTER_MODEL=openrouter/free
      - AI_TEMPERATURE=0.7
      - AI_MAX_TOKENS=8192
    regions:
      - fra
    build:
      commands:
        - pip install -r requirements-deploy.txt
      run: uvicorn api:app --host 0.0.0.0 --port 8000
